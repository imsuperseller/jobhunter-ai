async function claude(prompt, sys = "", maxTok = 1500) {
  try {
    const b = { model:"claude-sonnet-4-20250514", max_tokens:maxTok, messages:[{role:"user",content:prompt}] };
    if (sys) b.system = sys;
    const r = await fetch("/api/claude", {
      method:"POST", headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","x-api-key":CLAUDE_KEY}, body:JSON.stringify(b),
    });
    const d = await r.json();
    return d.content?.map(x => x.text||"").join("") || null;
  } catch(e) { console.warn("Claude API error:", e); return null; }
}

async function runApifyActor(actorId, input, onProgress) {
      console.log("[Apify] Starting actor run...");
      const startUrl = `https://api.apify.com/v2/acts/${actorId}/runs?token=${APIFY_TOKEN}`;
      let startRes;
      try {
        startRes = await fetch(startUrl, {
          method: "POST", headers: { "Content-Type": "application/json" }, 
          body: JSON.stringify(input),
        });
      } catch(e) {
        console.error("[Apify] Network error starting actor:", e.message);
        throw new Error("Apify network error: " + e.message);
      }
      if (!startRes.ok) {
        const errText = await startRes.text().catch(() => "");
        console.error("[Apify] Start failed:", startRes.status, errText);
        throw new Error("Apify start failed: " + startRes.status);
      }
      const runData = await startRes.json();
      const runId = runData.data?.id;
      if (!runId) {
        console.error("[Apify] No run ID in response");
        throw new Error("No run ID returned");
      }
      console.log("[Apify] Run started, ID:", runId);
      let lastStatus = "";
      for (let i = 0; i < 80; i++) {
        await new Promise(r => setTimeout(r, 5000));
        if (onProgress) onProgress(i + 1, 80, lastStatus);
        try {
          const statusRes = await fetch("https://api.apify.com/v2/actor-runs/" + runId + "?token=" + APIFY_TOKEN);
          if (!statusRes.ok) {
            console.warn("[Apify] Poll " + (i+1) + " status check HTTP error:", statusRes.status);
            continue;
          }
          const statusData = await statusRes.json();
          const status = statusData.data?.status;
          lastStatus = status || "UNKNOWN";
          console.log("[Apify] Poll " + (i+1) + "/80 status:", status);
          if (status === "SUCCEEDED") {
            const dsId = statusData.data?.defaultDatasetId;
            console.log("[Apify] Fetching dataset:", dsId);
            const itemsRes = await fetch("https://api.apify.com/v2/datasets/" + dsId + "/items?token=" + APIFY_TOKEN + "&limit=50");
            const items = await itemsRes.json();
            console.log("[Apify] Got " + (items || []).length + " items");
            return items;
          }
          if (status === "FAILED" || status === "ABORTED") {
            console.error("[Apify] Actor " + status);
            throw new Error("Actor " + status);
          }
        } catch(e) {
          if (e.message.startsWith("Actor ")) throw e;
          console.warn("[Apify] Poll " + (i+1) + " error (will retry):", e.message);
        }
      }
      throw new Error("Actor timed out after 80 polls (~7min)");
    }

function timeSince(dateStr) {
  try {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return mins + "m ago";
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + "h ago";
    return Math.floor(hrs/24) + "d ago";
  } catch(e) { return "Recently"; }
}

    // ===== AUTO-APPLY ENGINE =====
    
    async function saveAutoApplySettings(settings) {
      setAutoApplySettings(settings);
      localStorage.setItem("autoApplySettings", JSON.stringify(settings));
    }
    
    async function runAutoApply(job) {
      setApplyingJob(job.id || job.title);
      const log = (msg) => setApplyLog(prev => [...prev, { time: new Date().toLocaleTimeString(), msg, jobId: job.id || job.title }]);
      
      try {
        log("Starting auto-apply for: " + job.title + " at " + job.company);
        
        // Detect platform from URL
        const url = job.url || job.link || "";
        const isLinkedIn = url.includes("linkedin.com");
        const isIndeed = url.includes("indeed.com");
        
        if (!isLinkedIn && !isIndeed) {
          log("Ã¢ÂÂ  Not a LinkedIn or Indeed job URL. Auto-apply only works for LinkedIn Easy Apply and Indeed Apply.");
          setApplyingJob(null);
          return { success: false, reason: "unsupported_platform" };
        }
        
        // Check for required cookies
        if (isLinkedIn && !autoApplySettings.linkedinCookie) {
          log("Ã¢ÂÂ LinkedIn cookie (li_at) not set. Go to Settings to add it.");
          setApplyingJob(null);
          return { success: false, reason: "missing_cookie" };
        }
        if (isIndeed && !autoApplySettings.indeedCookie) {
          log("Ã¢ÂÂ Indeed cookie not set. Go to Settings to add it.");
          setApplyingJob(null);
          return { success: false, reason: "missing_cookie" };
        }
        
        // Step 1: Ask Claude to generate tailored form answers
        log("Ã°ÂÂ¤Â Generating AI-tailored answers...");
        const answersPrompt = "You are an expert job applicant. Generate professional answers for a job application.\n" +
          "Job: " + job.title + " at " + job.company + "\n" +
          "Description: " + (job.description || job.snippet || "N/A").substring(0, 1500) + "\n" +
          "Candidate phone: " + (autoApplySettings.phone || "Not provided") + "\n\n" +
          "Return ONLY a JSON object with these keys:\n" +
          '{ "yearsExperience": "number as string", "whyInterested": "1-2 sentences", "willingToRelocate": "Yes/No", "startDate": "Immediately/2 weeks notice", "salaryExpectation": "negotiable", "coverLetterSnippet": "2-3 sentences tailored to this role" }';
        
        let formAnswers = {};
        try {
          const aiResp = await callClaude(answersPrompt);
          const jsonMatch = aiResp.match(/\{[\s\S]*\}/);
          if (jsonMatch) formAnswers = JSON.parse(jsonMatch[0]);
          log("Ã¢ÂÂ AI answers generated");
        } catch (e) {
          log("Ã¢ÂÂ  AI answer generation failed, using defaults");
          formAnswers = { yearsExperience: "5", whyInterested: "Excited about this opportunity", willingToRelocate: "Yes", startDate: "2 weeks notice", salaryExpectation: "Negotiable", coverLetterSnippet: "I am very interested in this position." };
        }
        
        // Step 2: Build Playwright actions for the platform
        let actions = [];
        
        if (isLinkedIn) {
          log("Ã°ÂÂÂ Building LinkedIn Easy Apply sequence...");
          actions = [
            { type: "evaluate", value: "document.cookie = 'li_at=" + autoApplySettings.linkedinCookie + "; domain=.linkedin.com; path=/; secure'" },
            { type: "navigate", value: url },
            { type: "wait", value: "4000" },
            { type: "screenshot" },
            // Click Easy Apply button
            { type: "click", selector: "button.jobs-apply-button, button[aria-label*='Easy Apply']", timeout: 10000 },
            { type: "wait", value: "2000" },
            { type: "screenshot" },
            // Fill phone if field exists
            { type: "fill", selector: "input[name='phoneNumber'], input[id*='phone']", value: autoApplySettings.phone || "" },
            // Fill common question fields
            { type: "fill", selector: "input[aria-label*='years'], input[id*='experience']", value: formAnswers.yearsExperience || "5" },
            // Try clicking Next/Review buttons through multi-step
            { type: "click", selector: "button[aria-label='Continue to next step'], button[aria-label='Review your application'], footer button.artdeco-button--primary", timeout: 5000 },
            { type: "wait", value: "1500" },
            { type: "click", selector: "button[aria-label='Continue to next step'], button[aria-label='Review your application'], footer button.artdeco-button--primary", timeout: 5000 },
            { type: "wait", value: "1500" },
            // Submit
            { type: "click", selector: "button[aria-label='Submit application'], button[aria-label='Submit'], footer button.artdeco-button--primary", timeout: 5000 },
            { type: "wait", value: "3000" },
            { type: "screenshot" },
            { type: "extract_text", selector: "body" }
          ];
        } else if (isIndeed) {
          log("Ã°ÂÂÂ Building Indeed Apply sequence...");
          actions = [
            { type: "evaluate", value: "document.cookie = 'CTK=" + autoApplySettings.indeedCookie + "; domain=.indeed.com; path=/'" },
            { type: "navigate", value: url },
            { type: "wait", value: "4000" },
            { type: "screenshot" },
            { type: "click", selector: "#indeedApplyButton, button[id*='apply'], a[href*='apply']", timeout: 10000 },
            { type: "wait", value: "3000" },
            { type: "screenshot" },
            // Fill common Indeed form fields
            { type: "fill", selector: "input[name*='phone'], input[id*='phone']", value: autoApplySettings.phone || "" },
            { type: "fill", selector: "textarea[name*='cover'], textarea[id*='cover']", value: formAnswers.coverLetterSnippet || "" },
            // Click Continue/Submit
            { type: "click", selector: "button[type='submit'], button.ia-continueButton, button[id*='submit']", timeout: 5000 },
            { type: "wait", value: "2000" },
            { type: "click", selector: "button[type='submit'], button.ia-continueButton", timeout: 5000 },
            { type: "wait", value: "3000" },
            { type: "screenshot" },
            { type: "extract_text", selector: "body" }
          ];
        }
        
        // Step 3: Call Playwright MCP Actor via Apify API
        log("Ã°ÂÂÂ­ Launching browser automation...");
        const actorInput = {
          browser_type: "chromium",
          headless: true,
          stealth_mode: true,
          proxy: { use_apify_proxy: true, apify_proxy_groups: ["RESIDENTIAL"] },
          actions: actions,
          export_format: "json"
        };
        
        // Start the actor run
        const startResp = await fetch("https://api.apify.com/v2/acts/" + PLAYWRIGHT_ACTOR + "/runs?token=" + APIFY_TOKEN, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(actorInput)
        });
        const startData = await startResp.json();
        const runId = startData?.data?.id;
        
        if (!runId) {
          log("Ã¢ÂÂ Failed to start Playwright actor: " + JSON.stringify(startData?.error || startData));
          setApplyingJob(null);
          return { success: false, reason: "actor_start_failed" };
        }
        
        log("Ã¢ÂÂ³ Actor run started (ID: " + runId + "). Polling...");
        
        // Poll for completion (max 90 seconds)
        let status = "RUNNING";
        let attempts = 0;
        while (status === "RUNNING" || status === "READY") {
          if (attempts++ > 18) { // 18 * 5s = 90s
            log("Ã¢ÂÂ Timeout waiting for actor to complete");
            break;
          }
          await new Promise(r => setTimeout(r, 5000));
          const pollResp = await fetch("https://api.apify.com/v2/actor-runs/" + runId + "?token=" + APIFY_TOKEN);
          const pollData = await pollResp.json();
          status = pollData?.data?.status;
          log("Ã¢ÂÂ³ Status: " + status + " (" + attempts * 5 + "s)");
        }
        
        if (status !== "SUCCEEDED") {
          log("Ã¢ÂÂ Actor run failed with status: " + status);
          setApplyingJob(null);
          return { success: false, reason: "actor_" + status?.toLowerCase() };
        }
        
        // Get results from dataset
        log("Ã°ÂÂÂ¥ Fetching results...");
        const datasetResp = await fetch("https://api.apify.com/v2/actor-runs/" + runId + "/dataset/items?token=" + APIFY_TOKEN);
        const results = await datasetResp.json();
        
        const succeeded = results?.[0]?.successful_actions || 0;
        const failed = results?.[0]?.failed_actions || 0;
        const totalActions = results?.[0]?.total_actions || 0;
        
        // Check if submit action succeeded
        const actionsResult = results?.[0]?.actions || [];
        const submitAction = actionsResult.find(a => a.type === "click" && a.output?.includes?.("Submit"));
        const extractedText = actionsResult.find(a => a.type === "extract_text")?.output || "";
        const wasSuccessful = extractedText.toLowerCase().includes("application") && 
                             (extractedText.toLowerCase().includes("submitted") || extractedText.toLowerCase().includes("sent") || extractedText.toLowerCase().includes("received"));
        
        if (wasSuccessful) {
          log("Ã¢ÂÂ APPLICATION SUBMITTED SUCCESSFULLY!");
          // Update job status
          setAllJobs(prev => prev.map(j => 
            (j.id === job.id || j.title === job.title) 
              ? { ...j, status: "applied", appliedAt: new Date().toISOString(), autoApplied: true }
              : j
          ));
          setJobs(prev => prev.map(j => 
            (j.id === job.id || j.title === job.title) 
              ? { ...j, status: "applied", appliedAt: new Date().toISOString(), autoApplied: true }
              : j
          ));
        } else {
          log("Ã¢ÂÂ  Application may not have completed. Actions: " + succeeded + "/" + totalActions + " succeeded. Review screenshots in Apify console.");
        }
        
        log("Ã°ÂÂÂ Done. " + succeeded + "/" + totalActions + " actions succeeded, " + failed + " failed.");
        setApplyingJob(null);
        return { success: wasSuccessful, runId, succeeded, failed };
        
      } catch (err) {
        log("Ã¢ÂÂ Error: " + err.message);
        setApplyingJob(null);
        return { success: false, reason: err.message };
      }
    }
    
    // Bulk auto-apply
    async function bulkAutoApply(jobsList) {
      const maxPerSession = autoApplySettings.maxPerDay || 20;
      const toApply = jobsList.filter(j => j.status === "apply" || j.status === "new").slice(0, maxPerSession);
      
      setApplyLog([{ time: new Date().toLocaleTimeString(), msg: "Ã°ÂÂÂ Starting bulk auto-apply for " + toApply.length + " jobs (max " + maxPerSession + "/day)" }]);
      
      for (let i = 0; i < toApply.length; i++) {
        const job = toApply[i];
        setApplyLog(prev => [...prev, { time: new Date().toLocaleTimeString(), msg: "\nÃ¢ÂÂÃ¢ÂÂÃ¢ÂÂ Job " + (i+1) + "/" + toApply.length + " Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ" }]);
        await runAutoApply(job);
        
        // Random delay 30-90 seconds between applications
        if (i < toApply.length - 1) {
          const delay = 30000 + Math.random() * 60000;
          setApplyLog(prev => [...prev, { time: new Date().toLocaleTimeString(), msg: "Ã¢ÂÂ± Waiting " + Math.round(delay/1000) + "s before next application..." }]);
          await new Promise(r => setTimeout(r, delay));
        }
      }
      
      setApplyLog(prev => [...prev, { time: new Date().toLocaleTimeString(), msg: "\nÃ¢ÂÂ Bulk apply complete!" }]);
    }
