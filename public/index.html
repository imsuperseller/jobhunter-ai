async function claude(prompt, sys = "", maxTok = 1500) {
  try {
    const b = { model:"claude-sonnet-4-20250514", max_tokens:maxTok, messages:[{role:"user",content:prompt}] };
    if (sys) b.system = sys;
    const r = await fetch("/api/claude", {
      method:"POST", headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","x-api-key":CLAUDE_KEY}, body:JSON.stringify(b),
    });
    const d = await r.json();
    return d.content?.map(x => x.text||"").join("") || null;
  } catch(e) { console.warn("Claude API error:", e); return null; }
}

async function runApifyActor(actorId, input, onProgress) {
      console.log("[Apify] Starting actor run...");
      const startUrl = `https://api.apify.com/v2/acts/${actorId}/runs?token=${APIFY_TOKEN}`;
      let startRes;
      try {
        startRes = await fetch(startUrl, {
          method: "POST", headers: { "Content-Type": "application/json" }, 
          body: JSON.stringify(input),
        });
      } catch(e) {
        console.error("[Apify] Network error starting actor:", e.message);
        throw new Error("Apify network error: " + e.message);
      }
      if (!startRes.ok) {
        const errText = await startRes.text().catch(() => "");
        console.error("[Apify] Start failed:", startRes.status, errText);
        throw new Error("Apify start failed: " + startRes.status);
      }
      const runData = await startRes.json();
      const runId = runData.data?.id;
      if (!runId) {
        console.error("[Apify] No run ID in response");
        throw new Error("No run ID returned");
      }
      console.log("[Apify] Run started, ID:", runId);
      let lastStatus = "";
      for (let i = 0; i < 80; i++) {
        await new Promise(r => setTimeout(r, 5000));
        if (onProgress) onProgress(i + 1, 80, lastStatus);
        try {
          const statusRes = await fetch("https://api.apify.com/v2/actor-runs/" + runId + "?token=" + APIFY_TOKEN);
          if (!statusRes.ok) {
            console.warn("[Apify] Poll " + (i+1) + " status check HTTP error:", statusRes.status);
            continue;
          }
          const statusData = await statusRes.json();
          const status = statusData.data?.status;
          lastStatus = status || "UNKNOWN";
          console.log("[Apify] Poll " + (i+1) + "/80 status:", status);
          if (status === "SUCCEEDED") {
            const dsId = statusData.data?.defaultDatasetId;
            console.log("[Apify] Fetching dataset:", dsId);
            const itemsRes = await fetch("https://api.apify.com/v2/datasets/" + dsId + "/items?token=" + APIFY_TOKEN + "&limit=50");
            const items = await itemsRes.json();
            console.log("[Apify] Got " + (items || []).length + " items");
            return items;
          }
          if (status === "FAILED" || status === "ABORTED") {
            console.error("[Apify] Actor " + status);
            throw new Error("Actor " + status);
          }
        } catch(e) {
          if (e.message.startsWith("Actor ")) throw e;
          console.warn("[Apify] Poll " + (i+1) + " error (will retry):", e.message);
        }
      }
      throw new Error("Actor timed out after 80 polls (~7min)");
    }

function timeSince(dateStr) {
  try {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return mins + "m ago";
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + "h ago";
    return Math.floor(hrs/24) + "d ago";
  } catch(e) { return "Recently"; }
}

                  <div style={{ fontFamily:"monospace",fontSize:8,color:C.mut }}>{s.l}</div>
                </div>
              ))}
            </div>
            <Card c={C} label="冒聼聯聤 SOURCE PERFORMANCE">
              {(() => {
                const srcs = {};
                allJobs.forEach(j => {
                  if (!srcs[j.source]) srcs[j.source] = { total:0, interviews:0 };
                  srcs[j.source].total++;
                  if (j.status === "interview" || j.status === "offer") srcs[j.source].interviews++;
                });
                const maxTotal = Math.max(...Object.values(srcs).map(s=>s.total), 1);
                return Object.entries(srcs).sort((a,b)=>b[1].total-a[1].total).map(([src, data]) => (
                  <div key={src} style={{ display:"flex",alignItems:"center",gap:4,marginBottom:8 }}>
                    <div style={{ fontFamily:"monospace",fontSize:9,width:80,color:C.mut,textTransform:"capitalize" }}>{src}</div>
                    <div style={{ flex:1,height:8,background:C.bdr,borderRadius:4 }}>
                      <div style={{ height:"100%",borderRadius:4,width:(data.total/maxTotal)*100 + "%",background:C.acc2 }}/>
                    </div>
                    <div style={{ fontFamily:"monospace",fontSize:9,color:C.txt,width:60 }}>{data.total} jobs</div>
                    <div style={{ fontFamily:"monospace",fontSize:9,color:C.acc,width:80 }}>{data.interviews} interviews</div>
                  </div>
                ));
              })()}
              {allJobs.length === 0 && <div style={{ fontFamily:"monospace",fontSize:10,color:C.mut,textAlign:"center",padding:10 }}>Run a pipeline to see analytics</div>}
            </Card>
            {/* Charts Row */}
            <div style={{ display:"flex",gap:6,marginBottom:6,flexWrap:"wrap" }}>
              <div style={{ flex:"0 0 calc(65% - 6px)",minWidth:280,background:C.card,border:"1px solid " + C.bdr,borderRadius:7,padding:8 }}>
                <div style={{ fontFamily:"monospace",fontSize:9,color:C.mut,marginBottom:6,textTransform:"uppercase",letterSpacing:1 }}>冒聼聯聢 Applications Over Time</div>
                {(() => {
                  const byDate = {};
                  allJobs.forEach(j => {
                    const d = j.appliedAt ? new Date(j.appliedAt).toLocaleDateString("en-US",{month:"short",day:"numeric"}) : "Unknown";
                    byDate[d] = (byDate[d]||0)+1;
                  });
                  const lineData = Object.entries(byDate).map(([date,count])=>({date,count}));
                  if (lineData.length === 0) return <div style={{ fontFamily:"monospace",fontSize:10,color:C.mut,textAlign:"center",padding:10 }}>No data yet</div>;
                  return (
                    <ResponsiveContainer width="100%" height={200}>
                      <LineChart data={lineData} margin={{top:5,right:10,left:-20,bottom:5}}>
                        <XAxis dataKey="date" tick={{fontSize:8,fill:C.mut,fontFamily:"monospace"}} axisLine={{stroke:C.bdr}} tickLine={false}/>
                        <YAxis allowDecimals={false} tick={{fontSize:8,fill:C.mut,fontFamily:"monospace"}} axisLine={{stroke:C.bdr}} tickLine={false}/>
                        <Tooltip contentStyle={{background:C.card,border:"1px solid " + C.bdr,borderRadius:8,fontFamily:"monospace",fontSize:10,color:C.txt}} />
                        <Line type="monotone" dataKey="count" stroke={C.acc} strokeWidth={2} dot={{fill:C.acc,r:3}} activeDot={{r:5,fill:C.acc2}}/>
                      </LineChart>
                    </ResponsiveContainer>
                  );
                })()}
              </div>
              <div style={{ flex:"0 0 calc(35% - 6px)",minWidth:200,background:C.card,border:"1px solid " + C.bdr,borderRadius:7,padding:8 }}>
                <div style={{ fontFamily:"monospace",fontSize:9,color:C.mut,marginBottom:6,textTransform:"uppercase",letterSpacing:1 }}>冒聼楼搂 Status Distribution</div>
                {(() => {
                  const statuses = {};
                  allJobs.forEach(j => { statuses[j.status] = (statuses[j.status]||0)+1; });
                  const pieData = Object.entries(statuses).map(([name,value])=>({name,value}));
                  if (pieData.length === 0) return <div style={{ fontFamily:"monospace",fontSize:10,color:C.mut,textAlign:"center",padding:10 }}>No data yet</div>;
                  const total = pieData.reduce((s,d)=>s+d.value,0);
                  let cumPct = 0;
                  const gradParts = [];
                  pieData.forEach(d => {
                    const color = STAT_COLORS[d.name] || C.mut;
                    const start = cumPct;
                    cumPct += (d.value / total) * 100;
                    gradParts.push(color + " " + start.toFixed(1) + "% " + cumPct.toFixed(1) + "%");
                  });
                  const conicGrad = "conic-gradient(" + gradParts.join(", ") + ")";
                  return (
                    <div style={{ display:"flex",alignItems:"center",justifyContent:"center",gap:5,height:180 }}>
                      <div style={{ position:"relative",width:140,height:140 }}>
                        <div style={{ width:140,height:140,borderRadius:"50%",background:conicGrad }} />
                        <div style={{ position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:70,height:70,borderRadius:"50%",background:C.card }} />
                        <div style={{ position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontFamily:"monospace",fontSize:11,fontWeight:700,color:C.txt }}>{total}</div>
                      </div>
                      <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                        {pieData.map(d => (
                          <div key={d.name} style={{ display:"flex",alignItems:"center",gap:6 }}>
                            <div style={{ width:8,height:8,borderRadius:2,background:STAT_COLORS[d.name]||C.mut,flexShrink:0 }} />
                            <span style={{ fontFamily:"monospace",fontSize:9,color:C.txt }}>{d.name}</span>
                            <span style={{ fontFamily:"monospace",fontSize:9,color:C.mut }}>{d.value} ({(d.value/total*100).toFixed(0)}%)</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })()}
              </div>
            </div>
            <Card c={C} label="冒聼聯卤 FOLLOW-UP QUEUE">
              {followUps.filter(fu => fu.status !== "sent").slice(0,5).map(fu => {
                const days = Math.floor((Date.now() - new Date(fu.appliedAt).getTime()) / 86400000);
                return (
                  <div key={fu.jobId} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid " + C.bdr }}>
                    <span style={{ fontSize:10,color:days >= 7 ? C.warn : C.mut }}>{days >= 7 ? "芒職聽茂赂聫" : "冒聼聲聬"} {fu.company} 芒聙聰 {days} days</span>
                    <div style={{ display:"flex",gap:4 }}>
                      <button onClick={()=>openFollowUpModal(fu)} style={{ padding:"3px 8px",borderRadius:4,border:"1px solid rgba(" + (darkMode?"0,229,160":"0,184,122") + ",0.2)",background:"transparent",color:C.acc,fontFamily:"monospace",fontSize:8,cursor:"pointer" }}>View Draft</button>
                      <button onClick={()=>openFollowUpModal(fu)} style={{ padding:"3px 8px",borderRadius:4,border:"1px solid rgba(255,179,71,0.2)",background:"transparent",color:C.warn,fontFamily:"monospace",fontSize:8,cursor:"pointer" }}>冒聼聯卤 Send WA</button>
                    </div>
                  </div>
                );
              })}
              {followUps.filter(fu => fu.status !== "sent").length === 0 && <div style={{ fontFamily:"monospace",fontSize:10,color:C.mut,textAlign:"center",padding:12 }}>No pending follow-ups</div>}
            </Card>
          </div>
        )}

        {/* FOLLOW-UP MODAL */}
        {followUpModal && (
          <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:10 }} onClick={()=>setFollowUpModal(null)}>
            <div onClick={e=>e.stopPropagation()} style={{ background:C.card,borderRadius:8,padding:24,maxWidth:560,width:"100%",border:"1px solid " + C.bdr }}>
              <div style={{ fontFamily:"monospace",fontSize:11,color:C.acc,marginBottom:16 }}>冒聼聯卤 Follow-Up Draft 芒聙聰 {followUpModal.company}</div>
              <div style={{ fontFamily:"monospace",fontSize:9,color:C.mut,marginBottom:6 }}>TO: Your WhatsApp ({WAHA_NUMBER}) 芒聙聰 you forward to recruiter</div>
              <div style={{ padding:12,borderRadius:8,background:C.bg,border:"1px solid " + C.bdr,fontFamily:"monospace",fontSize:10,color:C.txt,lineHeight:1.8,marginBottom:6,whiteSpace:"pre-wrap" }}>
                {followUpModal.draft || "Generating draft..."}
              </div>
              <div style={{ marginBottom:6 }}>
                <div style={{ fontFamily:"monospace",fontSize:8,color:C.mut,marginBottom:4 }}>YOUR FEEDBACK</div>
                <input value={followUpModal.feedback||""} onChange={e=>setFollowUpModal({...followUpModal, feedback:e.target.value})} placeholder='e.g. "make it shorter"' style={{...input,fontSize:10}} />
              </div>
              <div style={{ display:"flex",gap:4 }}>
                <button onClick={approveAndSendFollowUp} disabled={followUpModal.status==="sending"}
                  style={{ flex:2,padding:5,borderRadius:8,border:"none",background:"linear-gradient(135deg," + C.acc + "," + (darkMode?"#00c88a":"#009963") + ")",color:darkMode?"#05060a":"#fff",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"'Syne',sans-serif" }}>
                  {followUpModal.status==="sending" ? "Sending..." : "芒聹聟 Approve & Send via WhatsApp"}
                </button>
                <button onClick={reviseFollowUp} disabled={!followUpModal.feedback || followUpModal.status==="revising"}
                  style={{ flex:1,padding:5,borderRadius:8,border:"1px solid " + C.bdr,background:"transparent",color:C.acc2,fontWeight:600,fontSize:11,cursor:followUpModal.feedback?"pointer":"not-allowed",fontFamily:"monospace" }}>
                  {followUpModal.status==="revising" ? "Revising..." : "芒聹聫茂赂聫 Revise"}
                </button>
                <button onClick={()=>setFollowUpModal(null)} style={{ padding:5,borderRadius:8,border:"1px solid rgba(" + (darkMode?"255,107,107":"224,85,85") + ",0.2)",background:"transparent",color:C.err,fontSize:11,cursor:"pointer",fontFamily:"monospace" }}>芒聺聦</button>
              </div>
            </div>
          </div>
        )}

        {/* INTERVIEW PREP VIEW */}
        {view==="prep" && (
          <div style={{ animation:"fi .3s" }}>
            {prepLoading ? (
              <div style={{ textAlign:"center",padding:40 }}>
                <div style={{ fontSize:11,marginBottom:6 }}>芒聫鲁</div>
                <div style={{ fontFamily:"monospace",fontSize:11,color:C.mut }}>Claude is generating your prep kit...</div>
              </div>
            ) : prepData ? (
              <div>
                <div style={{ marginBottom:8 }}>
                  <h2 style={{ fontSize:11,fontWeight:800,marginBottom:4 }}>冒聼聯職 Interview Prep: {prepData.title}</h2>
                  <div style={{ fontFamily:"monospace",fontSize:10,color:C.mut }}>{prepData.company}</div>
                </div>
                <Card c={C} label="冒聼聫垄 COMPANY BRIEF">
                  {prepData.brief && Object.entries(prepData.brief).map(([k,v])=>(
                    <div key={k} style={{ marginBottom:6 }}>
                      <span style={{ fontFamily:"monospace",fontSize:8,color:C.mut,textTransform:"uppercase" }}>{k}: </span>
                      <span style={{ fontFamily:"monospace",fontSize:10,color:C.txt }}>{v}</span>
                    </div>
                  ))}
                </Card>
                <Card c={C} label="芒聺聯 PRACTICE QUESTIONS">
                  {(prepData.questions||[]).map((q,i)=>(
                    <div key={i} style={{ padding:4,background:C.bg,borderRadius:6,marginBottom:6 }}>
                      <div style={{ fontFamily:"monospace",fontSize:10,color:C.txt,fontWeight:600 }}>{i+1}. {q.q}</div>
                      <div style={{ fontFamily:"monospace",fontSize:9,color:C.acc,marginTop:4 }}>冒聼聮隆 {q.hint}</div>
                    </div>
                  ))}
                </Card>
                <Card c={C} label="冒聼聯聥 CHEAT SHEET">
                  {prepData.cheatSheet && (
                    <div>
                      {prepData.cheatSheet.strengths && <div style={{ marginBottom:6 }}><Lbl c={C}>STRENGTHS</Lbl><div style={{ fontFamily:"monospace",fontSize:9,color:C.txt }}>{prepData.cheatSheet.strengths.join(", ")}</div></div>}
                      {prepData.cheatSheet.keywords && <div style={{ marginBottom:6 }}><Lbl c={C}>KEYWORDS</Lbl><div style={{ fontFamily:"monospace",fontSize:9,color:C.acc }}>{prepData.cheatSheet.keywords.join(", ")}</div></div>}
                      {prepData.cheatSheet.questionsToAsk && <div style={{ marginBottom:6 }}><Lbl c={C}>ASK THEM</Lbl>{prepData.cheatSheet.questionsToAsk.map((q,i)=><div key={i} style={{ fontFamily:"monospace",fontSize:9,color:C.txt }}>芒聙垄 {q}</div>)}</div>}
                      <div><Lbl c={C}>SALARY RANGE</Lbl><div style={{ fontFamily:"monospace",fontSize:10,color:C.warn }}>{prepData.cheatSheet.salaryRange}</div></div>
                    </div>
                  )}
                </Card>
                <button onClick={startMock} style={{ width:"100%",padding:14,borderRadius:11,border:"none",background:"linear-gradient(135deg," + C.acc2 + ",#4070cc)",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"'Syne',sans-serif",marginTop:8 }}>冒聼聨陇 Start Mock Interview</button>
              </div>
            ) : <div style={{ textAlign:"center",padding:40,fontFamily:"monospace",fontSize:10,color:C.mut }}>Click "Prep" on any job card to generate your interview kit</div>}
          </div>
        )}

        {/* MOCK INTERVIEW VIEW */}
        {view==="mock" && mockState && (
          <div style={{ animation:"fi .3s",maxWidth:640,margin:"0 auto" }}>
            <h2 style={{ fontSize:11,fontWeight:800,marginBottom:4 }}>冒聼聨陇 Mock Interview</h2>
            <div style={{ fontFamily:"monospace",fontSize:10,color:C.mut,marginBottom:8 }}>{mockState.title} at {mockState.company}</div>
            {/* Progress bar */}
            <div style={{ display:"flex",gap:3,marginBottom:8 }}>
              {mockState.questions.map((_,i) => (
                <div key={i} style={{ flex:1,height:4,borderRadius:2,background:i<mockState.currentQ?C.acc:i===mockState.currentQ?"rgba(" + (darkMode?"0,229,160":"0,184,122") + ",0.3)":C.bdr }}/>
              ))}
            </div>
            {mockState.currentQ < mockState.questions.length ? (
              <div>
                <Card c={C} label={"Q" + (mockState.currentQ+1) + " OF " + mockState.questions.length}>
                  <div style={{ fontSize:11,fontWeight:700,lineHeight:1.5,marginBottom:16 }}>{mockState.questions[mockState.currentQ].q}</div>
                  <textarea value={mockState.currentAnswer} onChange={e=>setMockState({...mockState,currentAnswer:e.target.value})}
                    placeholder="Type your answer..." style={{ ...input,minHeight:120,resize:"vertical" }} />
                </Card>
                <button onClick={submitMockAnswer} disabled={!mockState.currentAnswer.trim()}
                  style={{ width:"100%",padding:14,borderRadius:11,border:"none",background:mockState.currentAnswer.trim()?"linear-gradient(135deg," + C.acc + "," + C.acc2 + ")":C.bdr,color:mockState.currentAnswer.trim()?(darkMode?"#05060a":"#fff"):C.mut,fontWeight:700,fontSize:11,cursor:mockState.currentAnswer.trim()?"pointer":"not-allowed",fontFamily:"'Syne',sans-serif" }}>
                  Submit Answer 芒聠聮
                </button>
                {/* Previous feedback */}
                {mockState.feedback.length > 0 && (
                  <Card c={C} label="冒聼聯聤 PREVIOUS FEEDBACK" style={{marginTop:12}}>
                    {mockState.feedback.map((fb,i) => (
                      <div key={i} style={{ padding:4,background:C.bg,borderRadius:6,marginBottom:6 }}>
                        <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                          <span style={{ fontFamily:"monospace",fontSize:9,color:C.mut }}>Q{i+1}</span>
                          <span style={{ fontFamily:"monospace",fontSize:11,fontWeight:700,color:fb.score>=80?C.acc:fb.score>=60?C.warn:C.err }}>{fb.score}/100</span>
                        </div>
                        {fb.good?.length>0 && <div style={{ fontFamily:"monospace",fontSize:8,color:C.acc }}>芒聹聟 {fb.good.join(", ")}</div>}
                        {fb.improve?.length>0 && <div style={{ fontFamily:"monospace",fontSize:8,color:C.warn }}>芒職聽茂赂聫 {fb.improve.join(", ")}</div>}
                        {fb.tip && <div style={{ fontFamily:"monospace",fontSize:8,color:C.acc2 }}>冒聼聮隆 {fb.tip}</div>}
                      </div>
                    ))}
                  </Card>
                )}
              </div>
            ) : (
              <Card c={C} label="冒聼聨聣 MOCK COMPLETE">
                <div style={{ textAlign:"center",padding:10 }}>
                  <div style={{ fontSize:11,fontWeight:800,color:C.acc,marginBottom:8 }}>{Math.round(mockState.scores.reduce((a,s)=>a+s,0)/mockState.scores.length)}/100</div>
                  <div style={{ fontFamily:"monospace",fontSize:10,color:C.mut,marginBottom:16 }}>Average Score</div>
                  {mockState.feedback.map((fb,i) => (
                    <div key={i} style={{ padding:4,background:C.bg,borderRadius:6,marginBottom:6,textAlign:"left" }}>
                      <div style={{ fontFamily:"monospace",fontSize:9,fontWeight:700,color:C.txt }}>Q{i+1}: {mockState.questions[i]?.q?.slice(0,50)}...</div>
                      <div style={{ fontFamily:"monospace",fontSize:11,color:fb.score>=80?C.acc:fb.score>=60?C.warn:C.err,fontWeight:700 }}>{fb.score}/100</div>
                    </div>
                  ))}
                </div>
                <button onClick={()=>setView("prep")} style={{ width:"100%",padding:12,borderRadius:8,border:"1px solid " + C.bdr,background:"transparent",color:C.acc,fontWeight:600,fontSize:11,cursor:"pointer",fontFamily:"monospace",marginTop:8 }}>芒聠聬 Back to Prep</button>
              </Card>
            )}
          </div>
        )}
      </div>

      {/* CSS Animations */}
      <style>{`
        @keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        @keyframes su { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:${C.bdr};border-radius:3px}
      `}</style>
    </div>
  );
}

// 芒聰聙芒聰聙芒聰聙 MICRO COMPONENTS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function Card({c,label,children,style:s}) {
  return <div style={{background:c.card,border:"1px solid " + c.bdr,borderRadius:7,padding:4,marginBottom:6,...s}}>
    {label && <div style={{fontFamily:"monospace",fontSize:9,color:c.mut,marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>{label}</div>}
    {children}
  </div>;
}
function Lbl({c,children}) { return <div style={{fontFamily:"monospace",fontSize:9,color:c.mut,letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>{children}</div>; }
function Grid({children}) { return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>{React.Children.map(children,ch=>ch?.props?.full?<div style={{gridColumn:"1/-1"}}>{ch}</div>:ch)}</div>; }
function F({c,l,v,p,o,s,full}) {
  return <div style={full?{gridColumn:"1/-1"}:undefined}>
    <div style={{fontFamily:"monospace",fontSize:8,color:c?.mut||"#6b7094",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}}>{l}</div>
    <input value={v||""} onChange={e=>o(e.target.value)} placeholder={p} style={s}/>
  </div>;
}
function Btn({c,children,...p}) {
  return <button {...p} style={{padding:"6px 14px",borderRadius:6,border:"1px solid " + c.bdr,background:"transparent",color:c.acc,fontFamily:"monospace",fontSize:9,cursor:"pointer",...p.style}}>{children}</button>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
